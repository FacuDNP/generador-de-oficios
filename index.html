<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Oficios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body { font-family: Arial; padding:20px; background:#f9f6ef; }

input, select, textarea {
  padding:10px;
  margin:5px 0;
  border:1px solid #c9a96e;
  border-radius:6px;
  width:100%;
  box-sizing: border-box;
}

button {
  padding:12px;
  background:#c9a96e;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:15px;
}

button:hover { background:#b8904f; }

.hidden { display:none; }

.card {
  border:1px solid #e0d3b8;
  margin:6px 0;
  padding:10px;
  background:white;
  border-radius:8px;
  cursor:pointer;
}

.card:hover { background:#fdf5e6; }

#contenido { height:180px; }

label { display:flex; align-items:center; gap:8px; margin:8px 0; }
label input[type="checkbox"] { width:auto; }
</style>
</head>

<body>

<h2>📄 Generador de Oficios</h2>

<h3>🔎 Buscar expediente</h3>
<input id="buscador" placeholder="Buscar por carátula o expediente..." oninput="buscar()">
<p id="estado" style="font-size:13px; color:#888; margin:4px 0;"></p>
<div id="resultados"></div>

<div id="expedienteSeleccionado" style="display:none; background:#eaf4e8; border:1px solid #7cbb5e; border-radius:8px; padding:10px; margin:8px 0;">
  <strong>Expediente seleccionado:</strong>
  <span id="expResumen"></span>
  <button onclick="limpiarExpediente()" style="padding:4px 10px; margin-left:10px; font-size:12px;">✕ Cambiar</button>
</div>

<div id="camposManuales">
  <h3>Carátula (manual)</h3>
  <input id="caratulaManual" placeholder="Ej: GOMEZ JUAN c/ EMPRESA S.A. s/ COBRO DE PESOS">
  <h3>Nº de Expediente (manual)</h3>
  <input id="expedienteManual" placeholder="Ej: 12345/2024">
</div>

<h3>Juzgado</h3>
<select id="juzgado" onchange="actualizarJuzgado()">
  <option value="1">Juzgado 1</option>
  <option value="2">Juzgado 2</option>
  <option value="3">Juzgado 3</option>
  <option value="4">Juzgado 4</option>
  <option value="5">Juzgado 5</option>
  <option value="6">Juzgado 6</option>
</select>

<h3>Secretario/a</h3>
<select id="secretario"></select>

<h3>Organismo destinatario</h3>
<select id="organismo" onchange="toggleRegistro()">
  <option value="correo">Correo Argentino</option>
  <option value="andreani">Andreani</option>
  <option value="inmuebles">Inmuebles</option>
  <option value="registro">Registro Automotor</option>
  <option value="bcra">BCRA</option>
  <option value="arca">ARCA</option>
  <option value="macro">Banco Macro</option>
</select>

<input id="registroNumero" class="hidden" placeholder="Número de registro automotor">

<h3>Qué se solicita</h3>

<label>
  <input type="checkbox" id="usarPlantilla" onchange="togglePlantillas()">
  Usar plantillas predefinidas
</label>

<select id="plantillas" class="hidden" onchange="renderCampos(this.value)">
  <option value="">-- Seleccionar plantilla --</option>
  <option value="embargo_cuenta">Embargo sobre cuenta</option>
  <option value="embargo_inmueble">Embargo sobre inmueble</option>
  <option value="intercambio">Intercambio epistolar</option>
  <option value="comunicacion_d">Comunicación D</option>
</select>

<div id="camposPlantilla"></div>

<textarea id="contenido" placeholder="Texto del oficio..."></textarea>

<label>
  <input type="checkbox" id="honorarios">
  Proceso de ejecución de honorarios (NO incluir beneficio de justicia gratuita)
</label>

<br>
<button onclick="generarPDF()">📄 Generar PDF</button>

<script>

/* ===================== */
/* DATOS EXPEDIENTES     */
/* (Google Sheets)       */
/* ===================== */

let datos = [];
let caso = null;

function limpiar(t){ return (t || "").toString().toLowerCase(); }

async function cargarHoja(nombre){
  let url = `https://docs.google.com/spreadsheets/d/1rw1RyEKMKzIBasNQe_l6gQAajsRM_-9mFw5QEDBCvN4/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(nombre)}`;
  try {
    let res = await fetch(url);
    let text = await res.text();
    let json = JSON.parse(text.substring(47).slice(0, -2));
    let rows = json.table.rows || [];
    return rows.map(r => {
      let c = r.c.map(x => x ? x.v : "");
      return {
        texto: limpiar(c.join(" ")),
        caratula: c[0] || "",
        expediente: c[1] || ""
      };
    });
  } catch(e) {
    console.error("Error cargando hoja:", nombre, e);
    return [];
  }
}

async function iniciar(){
  document.getElementById("estado").textContent = "⏳ Cargando expedientes...";
  let a = await cargarHoja("Dr. Facundo");
  let b = await cargarHoja("Dr. Esequiel");
  let c = await cargarHoja("Dr. Javier");
  datos = [...a, ...b, ...c].filter(d => d.caratula);
  document.getElementById("estado").textContent = `✔ ${datos.length} expedientes cargados`;
}
iniciar();

function buscar(){
  let q = limpiar(document.getElementById("buscador").value);
  let div = document.getElementById("resultados");
  div.innerHTML = "";
  if(!q || q.length < 2) return;

  let filtrados = datos.filter(d => d.texto.includes(q));

  if(filtrados.length === 0){
    div.innerHTML = `<div class="card" style="color:#888;">No se encontraron expedientes. Podés completar los datos manualmente abajo.</div>`;
    return;
  }

  filtrados.slice(0, 20).forEach(e => {
    let card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<strong>${e.caratula}</strong><br><small>Expte. ${e.expediente}</small>`;
    card.onclick = () => seleccionarExpediente(e);
    div.appendChild(card);
  });
}

function seleccionarExpediente(e){
  caso = e;
  document.getElementById("resultados").innerHTML = "";
  document.getElementById("buscador").value = "";
  document.getElementById("expResumen").textContent = `${e.caratula} — Expte. N° ${e.expediente}`;
  document.getElementById("expedienteSeleccionado").style.display = "block";
  document.getElementById("camposManuales").style.display = "none";
}

function limpiarExpediente(){
  caso = null;
  document.getElementById("expedienteSeleccionado").style.display = "none";
  document.getElementById("camposManuales").style.display = "block";
}

/* ===================== */
/* JUZGADOS              */
/* ===================== */

const juzgados = {
  1: { juez:"BENAVIDEZ, CLAUDIA MARCELA", secretarios:["SUAREZ, SILVINA MABEL","ROMERO, VERONICA SILVIA"] },
  2: { juez:"BENAVIDEZ, CLAUDIA MARCELA", secretarios:["NICOSIA, ADRIANA ANDREA","LOBO, RODRIGO JAVIER"] },
  3: { juez:"PEREZ DEL CERRO, LUJAN", secretarios:["LIX KLETT, GUADALUPE","SAHA, MARIA ALICIA"] },
  4: { juez:"AVILA, CECILIA MARIANA", secretarios:["MONTELLANO, FEDERICO JAVIER","CIOCIANO, MARIANO HERNAN"] },
  5: { juez:"FARJAT, MIGUEL MARCELO", secretarios:["DIMARCO, HUGO GUILLERMO","SALIM, MARIAM TAMARA"] },
  6: { juez:"ALBERTO, MONICA LEILA", secretarios:["HERZBERG, VIRGINIA","IBAÑEZ, ROSA IRMA"] }
};

function actualizarJuzgado(){
  let j = document.getElementById("juzgado").value;
  let sec = document.getElementById("secretario");
  sec.innerHTML = "";
  juzgados[j].secretarios.forEach(s => {
    sec.innerHTML += `<option>${s}</option>`;
  });
}
actualizarJuzgado();

function toggleRegistro(){
  let val = document.getElementById("organismo").value;
  document.getElementById("registroNumero").classList.toggle("hidden", val !== "registro");
}

function togglePlantillas(){
  let check = document.getElementById("usarPlantilla").checked;
  document.getElementById("plantillas").classList.toggle("hidden", !check);
  if(!check){
    document.getElementById("camposPlantilla").innerHTML = "";
    document.getElementById("contenido").value = "";
  }
}

/* ===================== */
/* NUMERO A LETRAS       */
/* ===================== */

function numeroALetras(num){
  num = num.replace(",",".");
  let n = parseFloat(num);
  if(isNaN(n)) return "";

  let entero = Math.floor(n);
  let centavos = Math.round((n - entero) * 100);

  const u=["","UN","DOS","TRES","CUATRO","CINCO","SEIS","SIETE","OCHO","NUEVE"];
  const d=["","","TREINTA","CUARENTA","CINCUENTA","SESENTA","SETENTA","OCHENTA","NOVENTA"];
  const e=["DIEZ","ONCE","DOCE","TRECE","CATORCE","QUINCE","DIECISEIS","DIECISIETE","DIECIOCHO","DIECINUEVE"];

  function c(n){
    if(n===100) return "CIEN";
    if(n<100){
      if(n<10) return u[n];
      if(n<20) return e[n-10];
      if(n<30) return n===20?"VEINTE":"VEINTI"+u[n-20];
      return d[Math.floor(n/10)] + (n%10?" Y "+u[n%10]:"");
    }
    const cc=["","CIENTO","DOSCIENTOS","TRESCIENTOS","CUATROCIENTOS","QUINIENTOS","SEISCIENTOS","SETECIENTOS","OCHOCIENTOS","NOVECIENTOS"];
    return cc[Math.floor(n/100)]+" "+c(n%100);
  }

  function m(n){
    if(n<1000) return c(n);
    return (Math.floor(n/1000)===1?"MIL":c(Math.floor(n/1000))+" MIL")+" "+c(n%1000);
  }

  function mm(n){
    if(n<1000000) return m(n);
    return (Math.floor(n/1000000)===1?"UN MILLON":m(Math.floor(n/1000000))+" MILLONES")+" "+m(n%1000000);
  }

  let texto = mm(entero);
  if(centavos>0) texto += " CON "+c(centavos)+" CENTAVOS";
  return "PESOS "+texto.trim();
}

/* ===================== */
/* CAMPOS PLANTILLA      */
/* ===================== */

function renderCampos(tipo){
  let cont = document.getElementById("camposPlantilla");
  cont.innerHTML = "";

  function inp(id,p){ return `<input id="${id}" placeholder="${p}" oninput="actualizarTexto()">`; }
  function monto(id,l){
    return `
      <input id="${id}" placeholder="Monto $ (ej: 150000,50)" oninput="setMonto('${id}','${l}')">
      <input id="${l}" placeholder="En letras (se completa solo)" readonly style="background:#f5f5f5;">
    `;
  }

  if(tipo==="embargo_cuenta"){
    cont.innerHTML = inp("demandada","Demandada") + inp("cuit","CUIT") +
      "<label style='display:block;margin-top:8px'>Capital:</label>" + monto("capital","capital_l") +
      "<label style='display:block;margin-top:8px'>Accesorios:</label>" + monto("accesorios","accesorios_l") +
      inp("cuenta","Número de Cuenta") + inp("cbu","CBU");
  }

  if(tipo==="embargo_inmueble"){
    cont.innerHTML = inp("catastro","Catastro") + inp("depto","Departamento") +
      inp("demandado","Demandado") + inp("cuit","CUIT") +
      "<label style='display:block;margin-top:8px'>Capital:</label>" + monto("capital","capital_l") +
      "<label style='display:block;margin-top:8px'>Accesorios:</label>" + monto("accesorios","accesorios_l");
  }

  if(tipo==="comunicacion_d"){
    cont.innerHTML = inp("demandada","Demandada") + inp("cuit","CUIT") +
      "<label style='display:block;margin-top:8px'>Capital:</label>" + monto("capital","capital_l") +
      "<label style='display:block;margin-top:8px'>Accesorios:</label>" + monto("accesorios","accesorios_l") +
      inp("cuenta","Número de Cuenta") + inp("cbu","CBU");
  }

  if(tipo==="intercambio"){
    cont.innerHTML = "";
  }

  actualizarTexto();
}

function setMonto(n,l){
  let v = document.getElementById(n).value;
  document.getElementById(l).value = numeroALetras(v);
  actualizarTexto();
}

function val(id){
  let el = document.getElementById(id);
  return el ? el.value : "";
}

function actualizarTexto(){
  let tipo = document.getElementById("plantillas").value;
  let t = "";

  if(tipo==="embargo_cuenta"){
    t = `hacerle saber que se ha resuelto ordenar que se TRABE EMBARGO, sobre los fondos existentes o sumas a depositar en cuentas que la demandada ${val("demandada")} CUIT N° ${val("cuit")}, tenga a su favor, y lo sea por la suma de $${val("capital")} (${val("capital_l")}) en concepto de capital con más la suma de $${val("accesorios")} (${val("accesorios_l")}) calculada para accesorias legales provisorias, debiendo dichos fondos ser depositados en la Sección Depósitos Judiciales del Banco Macro S.A., CUENTA Nº ${val("cuenta")} - CBU Nº ${val("cbu")} a la orden de este Juzgado y como pertenecientes a estos obrados, presentando en el Juzgado la pertinente boleta de depósito, acompañada de un escrito.-`;
  }

  if(tipo==="embargo_inmueble"){
    t = `hacerle saber que se ha resuelto ordenar que se TRABE EMBARGO PREVENTIVO sobre el inmueble Catastro N° ${val("catastro")}, del departamento ${val("depto")}, propiedad del demandado ${val("demandado")}, CUIT ${val("cuit")}, y lo sea hasta cubrir la suma de $${val("capital")} (${val("capital_l")}) en concepto de capital, más la de $${val("accesorios")} (${val("accesorios_l")}) calculada provisoriamente para accesorios legales.-`;
  }

  if(tipo==="intercambio"){
    t = "solicitarle tenga a bien REMITIR copia autenticada como así Aviso o Certificado de Recepción de:";
  }

  if(tipo==="comunicacion_d"){
    t = `solicitarle a través de una Comunicación D, proceda circularizar en el sistema financiero la orden judicial de TRABAR EMBARGO sobre las sumas que la demandada ${val("demandada")}, CUIT: ${val("cuit")} posea hasta cubrir $${val("capital")} (${val("capital_l")}) en concepto de capital con más $${val("accesorios")} (${val("accesorios_l")}).
Para ello deberá depositar en CUENTA Nº ${val("cuenta")} - CBU Nº ${val("cbu")}.`;
  }

  document.getElementById("contenido").value = t;
}

/* ===================== */
/* GENERADOR PDF         */
/* ===================== */

function generarPDF(){

  // Obtener carátula y expediente: primero de 'caso' seleccionado, si no de los campos manuales
  let caratula = caso ? caso.caratula : document.getElementById("caratulaManual").value.trim();
  let expediente = caso ? caso.expediente : document.getElementById("expedienteManual").value.trim();

  if(!caratula){ caratula = "..."; }
  if(!expediente){ expediente = "..."; }

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF({ unit:"cm", format:"a4" });

  let x = 2.7;
  let y = 2;
  let sangria = 1.25;
  let maxWidth = 16.3;

  function checkPageBreak(){
    if(y > 27){
      doc.addPage();
      y = 2;
    }
  }

  function escribirJustificado(linea, startX, ancho, isLast){
    linea = linea.trim();
    if(!linea){
      y += 0.6;
      checkPageBreak();
      return;
    }

    let palabras = linea.split(" ").filter(p => p !== "");

    if(isLast || palabras.length <= 1){
      doc.text(linea, startX, y);
      y += 0.6;
      checkPageBreak();
      return;
    }

    let anchoTexto = doc.getTextWidth(linea);
    let espacios = palabras.length - 1;
    let extra = (ancho - anchoTexto) / espacios;

    // Si el extra es muy grande (línea muy corta), no justificar
    if(extra > 0.3){
      doc.text(linea, startX, y);
      y += 0.6;
      checkPageBreak();
      return;
    }

    let currentX = startX;
    palabras.forEach((p, i) => {
      doc.text(p, currentX, y);
      currentX += doc.getTextWidth(p);
      if(i < espacios){
        currentX += doc.getTextWidth(" ") + extra;
      }
    });

    y += 0.6;
    checkPageBreak();
  }

  let j = document.getElementById("juzgado").value;
  let juez = juzgados[j].juez;
  let secretario = document.getElementById("secretario").value;
  let contenido = document.getElementById("contenido").value;
  let esHonorarios = document.getElementById("honorarios").checked;
  let mail = "strabajo" + j + "@justiciasalta.gov.ar";

  let organismo = document.getElementById("organismo").value;
  let destino = "";
  if(organismo === "correo")   destino = "CORREO OFICIAL DE LA REPUBLICA ARGENTINA S.A.";
  if(organismo === "andreani") destino = "CORREO ANDREANI S.A.";
  if(organismo === "inmuebles") destino = "SEÑOR DIRECTOR DE LA DIRECCION GENERAL DE INMUEBLES";
  if(organismo === "registro") destino = "REGISTRO NACIONAL DE PROPIEDAD DEL AUTOMOTOR N° " + document.getElementById("registroNumero").value;
  if(organismo === "bcra")     destino = "SEÑOR DIRECTOR DEL BANCO CENTRAL DE LA REP. ARGENTINA";
  if(organismo === "arca")     destino = "A.R.C.A. (Ex A.F.I.P.)";
  if(organismo === "macro")    destino = "SEÑOR GERENTE DEL BANCO MACRO S.A.";

  let fecha = new Date();
  let meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  let fechaTexto = `SALTA, ${fecha.getDate()} de ${meses[fecha.getMonth()]} de ${fecha.getFullYear()}`;

  // ENCABEZADO
  doc.setFont("courier","bold");
  doc.setFontSize(13);
  doc.text(`Juzgado de 1º Instancia del Trabajo ${j}º Nom.`, 10.5, y, { align:"center" });
  y += 0.55;
  doc.text(`Avda. Bolivia esq. Avda. Houssay - 2do Piso - Ciudad Judicial Salta`, 10.5, y, { align:"center" });

  y += 1.2;
  doc.text("O F I C I O", 10.5, y, { align:"center" });

  y += 1.2;
  doc.setFont("courier","normal");
  doc.setFontSize(12);
  doc.text(fechaTexto, 19.3, y, { align:"right" });

  y += 1;
  doc.text("A:", x, y);
  y += 0.6;

  doc.setFont("courier","bold");
  doc.setFontSize(12);
  doc.text(destino, x, y);
  doc.setFont("courier","normal");

  y += 0.6;
  doc.text("S________/_______D", x, y);

  y += 1.6;

  // CUERPO DEL OFICIO
  let texto = `Me dirijo a Ud. en los autos caratulados "${caratula}", Expte. N° ${expediente} que se tramita ante este Juzgado de 1º Instancia del Trabajo ${j}º Nom., a cargo de la Dra. ${juez}; Secretaría de la Dra. ${secretario}, a fin de ${contenido}

Haciéndole saber que la respuesta podrá ser enviada en forma digital a la casilla de correo institucional del juzgado ${mail}, con indicación de los autos y número de expediente al que se dirige.`;

  if(!esHonorarios){
    texto += `

El presente juicio se tramita con Beneficio de justicia gratuita, exento del pago de impuestos y sellados de actuación (art. 21 CPL).`;
  }

  texto += `

Saludo a Uds. atentamente.-`;

  let parrafos = texto.split("\n");

  parrafos.forEach((p, pi) => {
    doc.setFont("courier","normal");
    doc.setFontSize(12);

    let lineas = doc.splitTextToSize(p.trim(), maxWidth);

    if(lineas.length === 0 || (lineas.length === 1 && lineas[0].trim() === "")){
      y += 0.5;
      checkPageBreak();
      return;
    }

    lineas.forEach((linea, i) => {
      // Primera línea del párrafo lleva sangría
      let startX = (i === 0) ? x + sangria : x;
      let ancho = (i === 0) ? maxWidth - sangria : maxWidth;
      let isLast = (i === lineas.length - 1);

      // Negrita para la carátula
      if(linea.includes(caratula) && caratula !== "..."){
        doc.setFont("courier","bold");
        doc.text(linea, startX, y);
        doc.setFont("courier","normal");
        y += 0.6;
        checkPageBreak();
      } else {
        escribirJustificado(linea, startX, ancho, isLast);
      }
    });

    y += 0.3;
    checkPageBreak();
  });

  doc.save("oficio.pdf");
}

</script>
</body>
</html>
